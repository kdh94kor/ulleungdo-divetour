<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>울릉도 프리다이빙 안내 🌊 (Admin Mode)</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <!-- Flatpickr (달력 및 24시간제 라이브러리) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/ko.js"></script>

    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="background-overlay"></div>
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- Auth Navbar -->
    <nav class="auth-nav">
        <div id="auth-state">
            <button id="nav-login-btn" class="btn">로그인 / 회원가입</button>
        </div>
    </nav>

    <header class="hero-section">
        <h1>Ulleungdo Freediving Trip</h1>
        <p>우리들의 울릉도 프리다이빙 여행 정보표</p>
    </header>

    <main class="content-grid">
        <!-- Section 1: Schedule -->
        <section class="glass-card" id="schedule-section">
            <div class="card-header">
                <h2><span class="icon">📅</span> 일정 공유</h2>
                <button id="add-schedule-btn" class="btn primary-btn admin-only" style="display:none;">+ 일정 추가</button>
            </div>
            <div class="card-content">
                <ul class="timeline" id="schedule-container">
                    <li>
                        <p>로딩 중...</p>
                    </li>
                </ul>
            </div>
        </section>

        <!-- Section 2: Accommodation -->
        <section class="glass-card" id="accommodation-section">
            <div class="card-header">
                <h2><span class="icon">🏠</span> 숙소 정보</h2>
                <button id="add-accommodation-btn" class="btn primary-btn admin-only" style="display:none;">+ 숙소
                    추가</button>
            </div>
            <div class="card-content">
                <div class="accommodation-info" id="accommodation-container">
                    <p style="color:white;">로딩 중...</p>
                </div>
            </div>
        </section>

        <!-- Section 3: Packing List -->
        <section class="glass-card" id="packing-section">
            <div class="card-header">
                <h2><span class="icon">🎒</span> 챙겨야 할 것</h2>
                <button id="add-packing-btn" class="btn primary-btn admin-only" style="display:none;">+ 물품 추가</button>
            </div>
            <div class="card-content">
                <div class="checklist" id="packing-container">
                    <p style="color:white;">로딩 중...</p>
                </div>
            </div>
        </section>

        <!-- Section 3: Transportation -->
        <section class="glass-card" id="transportation-section">
            <div class="card-header">
                <h2><span class="icon">🚢</span> 이동 방법</h2>
                <button id="add-transport-btn" class="btn primary-btn admin-only" style="display:none;">+ 이동 추가</button>
            </div>
            <div class="card-content">
                <div class="transport-info" id="transport-container">
                    <p style="color:white;">로딩 중...</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>안전하고 즐거운 프리다이빙 여행이 되기를! 🐬</p>
    </footer>

    <!-- MODALS -->

    <!-- Login Modal -->
    <div id="auth-modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" id="close-auth-modal">&times;</span>
            <h2 id="auth-title">로그인</h2>
            <form id="auth-form">
                <input type="text" id="auth-name" placeholder="이름 (가입자 성명)" style="display:none;">
                <input type="email" id="auth-email" placeholder="이메일" required>
                <input type="password" id="auth-password" placeholder="비밀번호" required>
                <button type="submit" class="btn primary-btn" id="auth-submit-btn">로그인</button>
            </form>
            <p class="toggle-text">계정이 없으신가요? <a href="#" id="toggle-auth-mode">가입하기</a></p>
        </div>
    </div>

    <!-- Unified Add & Edit Schedule Form Modal -->
    <div id="schedule-form-modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" id="close-schedule-modal">&times;</span>
            <h2 id="schedule-modal-title">일정 추가</h2>
            <form id="schedule-form">
                <input type="hidden" id="form-schedule-id">

                <label style="color:#e3f2fd; font-size:0.9rem;" for="form-date">일자 (달력)</label>
                <div class="flatpickr" style="display:flex; align-items:center; gap:0.5rem;" id="date-wrapper">
                    <input type="text" id="form-date" data-input placeholder="수동입력 (YYYY-MM-DD)" required
                        autocomplete="off" style="flex:1;">
                    <a class="input-button" title="달력 열기" data-toggle style="cursor:pointer; font-size:1.5rem;">📅</a>
                </div>

                <label style="color:#e3f2fd; font-size:0.9rem;" for="form-time">시간 (24시간제로 선택)</label>
                <div class="flatpickr" style="display:flex; align-items:center; gap:0.5rem;" id="time-wrapper">
                    <input type="text" id="form-time" data-input placeholder="수동입력 (HH:MM)" required autocomplete="off"
                        style="flex:1;">
                    <a class="input-button" title="시간 열기" data-toggle style="cursor:pointer; font-size:1.5rem;">🕒</a>
                </div>

                <label style="color:#e3f2fd; font-size:0.9rem;" for="form-title">타이틀</label>
                <input type="text" id="form-title" placeholder="예: 첫 다이빙" required>

                <label style="color:#e3f2fd; font-size:0.9rem;" for="form-content">상세 내용</label>
                <textarea id="form-content" rows="4" placeholder="예: 숙소 앞 바다 집결" required></textarea>

                <button type="submit" class="btn primary-btn" style="margin-top:1rem;">저장하기</button>
            </form>
        </div>
    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" id="close-history-modal">&times;</span>
            <h2><span class="icon">🕒</span> 수정 이력 조회</h2>
            <div class="history-list" id="history-container">
            </div>
        </div>
    </div>

    <!-- Accommodation Form Modal -->
    <div id="accommodation-form-modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" id="close-accommodation-modal">&times;</span>
            <h2 id="accommodation-modal-title">숙소 추가</h2>
            <form id="accommodation-form">
                <input type="hidden" id="form-accommodation-id">

                <label style="color:#e3f2fd; font-size:0.9rem;" for="form-accommodation-name">숙소명</label>
                <input type="text" id="form-accommodation-name" placeholder="예: 울릉 리조트" required>

                <label style="color:#e3f2fd; font-size:0.9rem;" for="form-accommodation-url">웹사이트 주소 (URL)</label>
                <input type="url" id="form-accommodation-url" placeholder="예: https://example.com" autocomplete="off">

                <label style="color:#e3f2fd; font-size:0.9rem;" for="form-accommodation-address">주소 (네비게이션용 검색
                    주소)</label>
                <input type="text" id="form-accommodation-address" placeholder="예: 경북 울릉군 울릉읍 어쩌구" required>

                <label style="color:#e3f2fd; font-size:0.9rem;" for="form-accommodation-description">상세 설명</label>
                <textarea id="form-accommodation-description" rows="3" placeholder="예: 301호 오션뷰 숙소" required></textarea>

                <button type="submit" class="btn primary-btn" style="margin-top:1rem;">저장하기</button>
            </form>
        </div>
    </div>

    <!-- Packing Form Modal -->
    <div id="packing-form-modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" id="close-packing-modal">&times;</span>
            <h2 id="packing-modal-title">준비물 추가</h2>
            <form id="packing-form">
                <input type="hidden" id="form-packing-id">
                <label style="color:#e3f2fd; font-size:0.9rem;" for="form-packing-name">물품 이름</label>
                <input type="text" id="form-packing-name" placeholder="예: 스노클" required>
                <button type="submit" class="btn primary-btn" style="margin-top:1rem;">저장하기</button>
            </form>
        </div>
    </div>

    <!-- Transport Form Modal -->
    <div id="transport-form-modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-btn" id="close-transport-modal">&times;</span>
            <h2 id="transport-modal-title">이동방법 추가</h2>
            <form id="transport-form">
                <input type="hidden" id="form-transport-id">

                <label style="color:#e3f2fd; font-size:0.9rem;" for="form-transport-category">카테고리</label>
                <input type="text" id="form-transport-category" placeholder="예: 1. 항구로 이동 (육로)" required>

                <label style="color:#e3f2fd; font-size:0.9rem;" for="form-transport-title">타이틀</label>
                <input type="text" id="form-transport-title" placeholder="예: 자차" required>

                <label style="color:#e3f2fd; font-size:0.9rem;" for="form-transport-description">상세 설명</label>
                <textarea id="form-transport-description" rows="3" placeholder="예: 카풀 인원 배정 완료" required></textarea>

                <button type="submit" class="btn primary-btn" style="margin-top:1rem;">저장하기</button>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="js/app.js"></script>
</body>

</html>
